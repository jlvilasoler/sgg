# Render Blueprint — https://render.com/docs/blueprint-spec
# IMPORTANTE: tipo web (Node), NO Static Site. La API + SQLite requieren proceso Node.
services:
  - type: web
    name: sgg
    runtime: node
    plan: free
    repo: https://github.com/jlvilasoler/sgg
    branch: main
    buildCommand: npm run build:render
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: scg-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCG_DATA_DIR
        value: /var/data
      - key: SCG_TRUST_PROXY
        value: "1"
      - key: SCG_CLIENT_ORIGIN
        value: https://sgg-dcpo.onrender.com
      - key: SCG_ADMIN_EMAIL
        sync: false
      - key: SCG_ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
